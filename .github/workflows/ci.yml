name: CI

# Se ejecuta en cada Pull Request y en cada push a main, para evitar que
# un cambio roto llegue a producción sin ser detectado.
on:
  pull_request:
  push:
    branches: [main]

# Si se hace push varias veces seguidas a la misma rama/PR, cancela la
# ejecución anterior en curso en vez de acumular corridas redundantes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Tests y build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias (versión exacta del lockfile)
        run: npm ci

      - name: Ejecutar suite de pruebas (Vitest)
        run: npm test

      - name: Verificar dependencias vulnerables (npm audit)
        # No bloqueante: xlsx tiene 2 vulnerabilidades high sin fix
        # disponible del lado de la librería (Prototype Pollution y
        # ReDoS). Bloquear el pipeline por algo sin solución dejaría
        # trabado cualquier PR futuro que no tenga nada que ver con
        # esto. Se deja como alerta visible en los logs del CI.
        run: npm audit --audit-level=high || true

      - name: Verificar que el build de producción no se rompe
        run: npm run build
        env:
          # Valores ficticios, solo para que scripts/check-env.js y el
          # build de Vite tengan variables con las que trabajar en CI.
          # No son credenciales reales ni dan acceso a ningún proyecto
          # de Supabase.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key

      - name: Smoke test de RLS (clave anónima real)
        # A diferencia del build de arriba, este paso SÍ necesita
        # credenciales reales porque le pega en vivo a la API REST de
        # Supabase para confirmar que las tablas sensibles rechazan
        # lecturas/escrituras no autorizadas con la clave anon. Ver
        # scripts/rls-smoke-test.mjs. Si SUPABASE_URL/SUPABASE_ANON_KEY
        # no están configurados como secrets del repo, el paso se salta
        # con un aviso en vez de fallar.
        run: npm run rls:smoke-test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
