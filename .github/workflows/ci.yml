name: CI

# Se ejecuta en cada Pull Request y en cada push a main, para evitar que
# un cambio roto llegue a producción sin ser detectado.
on:
  pull_request:
  push:
    branches: [main]

# Si se hace push varias veces seguidas a la misma rama/PR, cancela la
# ejecución anterior en curso en vez de acumular corridas redundantes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Tests y build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22+ requerido: @supabase/realtime-js necesita WebSocket
          # nativo (disponible desde Node 22) para construir el cliente de
          # Supabase, algo que ocurre incluso en tests que no lo usan
          # directamente (useAuth.test.js importa el hook real, que importa
          # src/lib/supabase.js). En Node 20 esto rompe con:
          # "Node.js 20 detected without native WebSocket support".
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias (versión exacta del lockfile)
        run: npm ci

      - name: Verificar estilo y errores comunes (ESLint — ARCH-16)
        run: npm run lint

      - name: Ejecutar suite de pruebas (Vitest)
        run: npm test

      - name: Verificar dependencias vulnerables (npm audit)
        # Fix D-6 (auditoría 5 de julio, corregido): las 2 vulnerabilidades
        # high de xlsx (Prototype Pollution CVE-2023-30533, ReDoS
        # CVE-2024-22363) SÍ tienen fix — SheetJS dejó de publicar en el
        # registro de npm y distribuye únicamente vía cdn.sheetjs.com, por
        # lo que `npm audit` nunca lo iba a ver aunque existiera. Se apuntó
        # `package.json` a la versión parchada (0.20.3) vía esa CDN, así
        # que este paso vuelve a ser bloqueante como cualquier otra
        # dependencia. Si npm audit vuelve a marcar `xlsx` en el futuro,
        # revisar primero si hay una versión más nueva en cdn.sheetjs.com
        # antes de asumir que sigue sin solución.
        #
        # --omit=dev (9 de julio): esbuild/vite (GHSA-67mh-4wv8-2f99, CORS
        # del servidor `vite dev`) son devDependencies — nunca se envían al
        # navegador del usuario final, solo se usan localmente al correr
        # `npm run dev` o al hacer `vite build`. Arreglarlo de raíz exige
        # `vite@8` (breaking change) solo para tapar un aviso que no aplica
        # a producción. Se excluye devDependencies del audit bloqueante
        # para no forzar una migración mayor por una vulnerabilidad sin
        # impacto real en lo que se despliega. Si `npm audit` (sin
        # --omit=dev) sigue marcando esto en el futuro y ya hay un upgrade
        # de vite sin breaking changes disponible, vale la pena tomarlo;
        # mientras tanto no bloquea. Cualquier vulnerabilidad nueva en
        # `dependencies` (lo que sí llega a producción) sigue bloqueando
        # igual que siempre.
        run: npm audit --omit=dev --audit-level=high

      - name: Verificar que el build de producción no se rompe
        run: npm run build
        env:
          # Valores ficticios, solo para que scripts/check-env.js y el
          # build de Vite tengan variables con las que trabajar en CI.
          # No son credenciales reales ni dan acceso a ningún proyecto
          # de Supabase.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key

      - name: Smoke test de RLS (clave anónima real)
        # A diferencia del build de arriba, este paso SÍ necesita
        # credenciales reales porque le pega en vivo a la API REST de
        # Supabase para confirmar que las tablas sensibles rechazan
        # lecturas/escrituras no autorizadas con la clave anon. Ver
        # scripts/rls-smoke-test.mjs. Si SUPABASE_URL/SUPABASE_ANON_KEY
        # no están configurados como secrets del repo, el paso se salta
        # con un aviso en vez de fallar.
        run: npm run rls:smoke-test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  visual-regression:
    name: Regresión visual (Playwright)
    runs-on: ubuntu-latest
    # Fix U-10 (auditoría 12 de julio): job separado del job principal a
    # propósito — un diff visual (o una imagen base todavía inexistente)
    # nunca debe bloquear un build/test/deploy que sí está bien. Ver
    # docs/AUDITORIA_INDICE.md § U-10 para el motivo original del hallazgo.
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias (versión exacta del lockfile)
        run: npm ci

      - name: Instalar navegador de Playwright (solo Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build de producción
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key

      - name: Correr tests visuales
        run: npm run test:visual

      - name: Subir reporte HTML (si hubo diffs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
    # TEMPORAL: quitar esta línea una vez que las imágenes base de
    # tests/visual/__screenshots__/ estén commiteadas y confirmadas
    # estables en al menos 2-3 corridas de CI seguidas sin diffs falsos.
    # Sin esto, el job falla en TODOS los PRs (no hay baseline todavía) y
    # entrena a ignorar el check — justo el problema que U-10 quería evitar.
    continue-on-error: true
