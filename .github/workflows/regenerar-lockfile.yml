name: Regenerar package-lock.json

# Se dispara manualmente desde la pestaña Actions (botón "Run workflow").
# Útil para casos como D-6: cuando se cambia una dependencia en package.json
# a algo que no se resuelve por semver normal (ej. un tgz de una CDN externa)
# y hace falta que npm vuelva a calcular el lockfile, pero no hay un
# entorno local con acceso a esa CDN para correr `npm install` a mano.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerar-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Borrar lockfile y node_modules viejos
        # Fuerza a npm a resolver todo desde cero contra lo que dice
        # package.json ahora mismo, en vez de reusar entradas viejas
        # del lockfile anterior.
        run: rm -rf package-lock.json node_modules

      - name: npm install (regenera el lockfile)
        run: npm install

      - name: Commit y push del lockfile actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json no cambió, nada que commitear."
          else
            git commit -m "chore: regenerar package-lock.json (workflow manual)"
            git push
          fi
