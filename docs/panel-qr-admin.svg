<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="380" fill="#F8FAFC"/>
  <rect x="20" y="20" width="860" height="340" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="50" y="55" font-size="16" font-weight="700" fill="#0F172A">Panel de Control de Asistencias</text>
  <rect x="700" y="38" width="150" height="30" rx="15" fill="#DCFCE7"/>
  <text x="775" y="58" text-anchor="middle" font-size="11" fill="#16A34A" font-weight="600">● Sesión activa</text>

  <!-- Configuración -->
  <g transform="translate(50,85)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#475569">Turno</text>
    <rect x="0" y="8" width="140" height="32" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="12" y="29" font-size="11" fill="#334155">DIURNO ▾</text>

    <text x="160" y="0" font-size="11" font-weight="600" fill="#475569">Programa</text>
    <rect x="160" y="8" width="160" height="32" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="172" y="29" font-size="11" fill="#334155">Informática ▾</text>

    <rect x="340" y="8" width="120" height="32" rx="8" fill="#DC2626"/>
    <text x="400" y="29" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">Cerrar sesión</text>
  </g>

  <!-- QR + contador -->
  <g transform="translate(50,150)">
    <rect width="180" height="180" rx="10" fill="#0F172A"/>
    <rect x="15" y="15" width="150" height="150" fill="#FFFFFF"/>
    <rect x="30" y="30" width="35" height="35" fill="#0F172A"/>
    <rect x="115" y="30" width="35" height="35" fill="#0F172A"/>
    <rect x="30" y="115" width="35" height="35" fill="#0F172A"/>
    <rect x="80" y="75" width="30" height="30" fill="#0F172A"/>
    <text x="90" y="200" text-anchor="middle" font-size="10" fill="#64748B">Se proyecta en el aula</text>
  </g>

  <g transform="translate(270,150)">
    <rect width="140" height="80" rx="10" fill="#EFF6FF"/>
    <text x="70" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#2563EB">04:47</text>
    <text x="70" y="50" text-anchor="middle" font-size="10" fill="#2563EB">min. para rotar</text>
    <text x="70" y="66" text-anchor="middle" font-size="8" fill="#64748B">(o antes, si escanean)</text>

    <rect y="90" width="140" height="34" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="70" y="111" text-anchor="middle" font-size="10" fill="#475569">↻ Regenerar QR ahora</text>
  </g>

  <!-- feed de actividad -->
  <g transform="translate(440,150)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#0F172A">Actividad en vivo</text>
    <rect y="12" width="410" height="34" rx="6" fill="#F8FAFC"/>
    <circle cx="16" cy="29" r="4" fill="#16A34A"/>
    <text x="30" y="33" font-size="10" fill="#334155">María Pérez — ENTRADA — 8:03 a.m.</text>
    <rect y="50" width="410" height="34" rx="6" fill="#F8FAFC"/>
    <circle cx="16" cy="67" r="4" fill="#16A34A"/>
    <text x="30" y="71" font-size="10" fill="#334155">Carlos Ruiz — ENTRADA — 8:05 a.m.</text>
    <rect y="88" width="410" height="34" rx="6" fill="#F8FAFC"/>
    <circle cx="16" cy="105" r="4" fill="#16A34A"/>
    <text x="30" y="109" font-size="10" fill="#334155">Ana Gómez — SALIDA — 8:06 a.m.</text>

    <rect y="140" width="130" height="50" rx="8" fill="#DCFCE7"/>
    <text x="65" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#16A34A">14</text>
    <text x="65" y="178" text-anchor="middle" font-size="9" fill="#16A34A">Entradas hoy</text>

    <rect x="140" y="140" width="130" height="50" rx="8" fill="#FEF3C7"/>
    <text x="205" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#B45309">3</text>
    <text x="205" y="178" text-anchor="middle" font-size="9" fill="#B45309">Salidas hoy</text>

    <rect x="280" y="140" width="130" height="50" rx="8" fill="#EFF6FF"/>
    <text x="345" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#2563EB">11</text>
    <text x="345" y="178" text-anchor="middle" font-size="9" fill="#2563EB">Presentes ahora</text>
  </g>
</svg>
